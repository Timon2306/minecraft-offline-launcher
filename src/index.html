<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Offline Launcher</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Кастомный тайтлбар -->
  <div id="titlebar">
    <div id="titlebar-title">
      <svg class="mc-icon" viewBox="0 0 24 24" width="16" height="16">
        <path fill="currentColor" d="M4,2H20A2,2 0 0,1 22,4V20A2,2 0 0,1 20,22H4A2,2 0 0,1 2,20V4A2,2 0 0,1 4,2M6,6V10H10V6H6M14,6V10H18V6H14M6,14V18H10V14H6M14,14V18H18V14H14Z" />
      </svg>
      <span>Minecraft Launcher</span>
    </div>
    <div id="titlebar-buttons">
      <button id="btn-minimize" title="Свернуть">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20,14H4V10H20V14Z"/></svg>
      </button>
      <button id="btn-close" title="Закрыть">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
      </button>
    </div>
  </div>

  <div id="app">
    <!-- Логотип сверху слева -->
    <div class="logo-container">
      <h1>MINECRAFT</h1>
      <p class="subtitle">OFFLINE EDITION</p>
    </div>

    <!-- Нижняя панель управления (Glassmorphism) -->
    <div id="main-card" class="bottom-bar">
      <!-- Ввод никнейма -->
      <div class="input-group">
        <input type="text" id="nickname-input" placeholder="Никнейм" autocomplete="off" maxlength="16">
        <span class="input-glow"></span>
      </div>

      <!-- Выпадающий список версий -->
      <div id="version-dropdown">
        <div id="version-selected">Загрузка версий...</div>
        <div id="version-list">
          <div id="version-list-dynamic"></div>
          <div class="snapshots-toggle-container">
            <label for="snapshots-toggle">
              <input type="checkbox" id="snapshots-toggle">
              <span>Снапшоты</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Кнопка ИГРАТЬ -->
      <button id="play-button">ИГРАТЬ</button>

      <!-- Иконка настроек -->
      <button id="settings-icon" title="Настройки">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.08L14.47,2.42C14.43,2.18 14.22,2 13.97,2H9.97C9.72,2 9.51,2.18 9.47,2.42L9.09,5.08C8.47,5.34 7.9,5.66 7.38,6.05L4.89,5.05C4.67,4.96 4.4,5.05 4.27,5.27L2.27,8.73C2.15,8.95 2.2,9.22 2.4,9.37L4.51,11C4.47,11.34 4.45,11.67 4.45,12C4.45,12.33 4.47,12.65 4.51,12.97L2.4,14.63C2.2,14.78 2.15,15.05 2.27,15.27L4.27,18.73C4.4,18.95 4.67,19.04 4.89,18.95L7.38,17.95C7.9,18.34 8.47,18.66 9.09,18.92L9.47,21.58C9.51,21.82 9.72,22 9.97,22H13.97C14.22,22 14.43,21.82 14.47,21.58L14.86,18.92C15.47,18.66 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" />
        </svg>
      </button>

      <!-- Кнопка Моды и Сборки (рядом с шестеренкой) -->
      <button id="mods-btn" title="Моды и сборки">
        <svg viewBox="0 0 24 24" width="22" height="22" style="display: block;">
          <path fill="currentColor" d="M21,16.5C21,16.88 20.79,17.21 20.47,17.38L12.57,21.78C12.21,21.98 11.79,21.98 11.43,21.78L3.53,17.38C3.21,17.21 3,16.88 3,16.5V7.5C3,7.12 3.21,6.79 3.53,6.62L11.43,2.22C11.79,2.02 12.21,2.02 12.57,2.22L20.47,6.62C20.79,6.79 21,7.12 21,7.5V16.5M12,4.15L6.04,7.5L12,10.85L17.96,7.5L12,4.15M5,9.2V15.8L11,19.15V12.55L5,9.2M13,19.15L19,15.8V9.2L13,12.55V19.15Z" />
        </svg>
      </button>

      <!-- Кнопка открыть папку игры -->
      <button id="folder-btn" title="Открыть папку игры">
        <svg viewBox="0 0 24 24" width="22" height="22" style="display: block;">
          <path fill="currentColor" d="M20,18H4V8h16V18z M20,6h-8l-2-2H4C2.9,4,2,4.9,2,6v12c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V8C22,6.9,21.1,6,20,6z" />
        </svg>
      </button>

      <!-- Кнопка GitHub -->
      <button id="github-btn" title="Репозиторий GitHub" style="position: relative; background: rgba(0, 0, 0, 0.25); border: 1px solid var(--glass-border); color: var(--text-dimmed); cursor: pointer; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s ease;">
        <svg viewBox="0 0 24 24" width="22" height="22" style="display: block;">
          <path fill="currentColor" d="M12,2A10,10 0 0,0 2,12C2,16.42 4.87,20.17 8.84,21.5C9.34,21.58 9.5,21.27 9.5,21C9.5,20.77 9.5,20.14 9.5,19.31C6.73,19.91 6.14,17.97 6.14,17.97C5.68,16.81 5.03,16.5 5.03,16.5C4.12,15.88 5.1,15.9 5.1,15.9C6.1,15.97 6.63,16.93 6.63,16.93C7.5,18.45 8.97,18 9.54,17.76C9.63,17.11 9.89,16.67 10.17,16.42C7.95,16.17 5.62,15.31 5.62,11.5C5.62,10.41 6,9.54 6.63,8.85C6.53,8.6 6.18,7.58 6.73,6.21C6.73,6.21 7.56,5.95 9.45,7.23C10.24,7 11.08,6.9 11.91,6.9C12.75,6.9 13.59,7 14.38,7.23C16.27,5.95 17.1,6.21 17.1,6.21C17.65,7.58 17.3,8.6 17.2,8.85C17.83,9.54 18.21,10.41 18.21,11.5C18.21,15.32 15.88,16.16 13.66,16.41C14.03,16.73 14.36,17.35 14.36,18.3C14.36,19.67 14.35,20.77 14.35,21C14.35,21.27 14.5,21.59 15,21.5C18.97,20.17 21.88,16.42 21.88,12C21.88,6.58 17.47,2 12,2Z" />
        </svg>
        <span id="github-badge" style="display: none; position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background-color: #ff4757; border-radius: 50%; border: 1.5px solid rgba(10, 10, 18, 0.9); box-shadow: 0 0 8px #ff4757;"></span>
      </button>

      <!-- Прогресс-бар (встроенный в верхнюю кромку панели) -->
      <div id="progress-container">
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div id="status-text">Инициализация...</div>
      </div>
    </div>
  </div>

  <!-- Оверлей каталога модов и сборок (теперь вынесен в корень) -->
  <div id="catalog-overlay">
    <div id="catalog-modal">
      <div class="modal-header">
        <div>
          <h2 id="lbl-catalog-title">Моды и сборки</h2>
          <div id="catalog-target-info" style="font-size: 11px; color: var(--text-dimmed); margin-top: 4px; letter-spacing: 0.5px;"></div>
        </div>
        <button id="catalog-close" title="Закрыть">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div class="modal-body-catalog">
        <div class="catalog-header-bar">
          <div style="display: flex; gap: 10px; flex: 1; max-width: 620px;">
            <div class="search-box" style="flex: 1;">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
              <input type="text" id="catalog-search" placeholder="Поиск модов и сборок...">
            </div>
            <select id="catalog-version-filter" class="catalog-version-select">
              <option value="">Все версии</option>
              <option value="1.21">1.21</option>
              <option value="1.20.4">1.20.4</option>
              <option value="1.20.1">1.20.1</option>
              <option value="1.19.2">1.19.2</option>
              <option value="1.18.2">1.18.2</option>
              <option value="1.16.5">1.16.5</option>
              <option value="1.12.2">1.12.2</option>
              <option value="1.7.10">1.7.10</option>
            </select>
          </div>
          <div class="catalog-filters">
            <button class="filter-btn active" data-type="modpack">СБОРКИ</button>
            <button class="filter-btn" data-type="mod">МОДЫ</button>
            <button id="import-zip-btn" class="import-btn" title="Установить локальную сборку из .zip или .mrpack">ИМПОРТ ZIP</button>
            <button id="create-instance-btn" class="import-btn" title="Создать собственную сборку">СОЗДАТЬ СБОРКУ</button>
          </div>
        </div>
        <div id="catalog-grid">
          <!-- Сюда будут динамически подгружаться карточки с Modrinth -->
        </div>
      </div>
    </div>
  </div>

  <!-- Оверлей настроек -->
  <div id="settings-overlay">
    <div id="settings-modal" class="settings-expanded">
      <div class="modal-header">
        <h2>Настройки</h2>
        <button id="settings-close" title="Закрыть">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div class="settings-container">
        <!-- Левая панель: Вкладки -->
        <div class="settings-sidebar">
          <button class="settings-tab-btn active" data-tab="general" id="btn-tab-general">Основные</button>
          <button class="settings-tab-btn" data-tab="launch" id="btn-tab-launch">Запуск и Java</button>
          <button class="settings-tab-btn" data-tab="appearance" id="btn-tab-appearance">Внешний вид</button>
        </div>
        
        <!-- Правая панель: Содержимое -->
        <div class="settings-content">
          <!-- Вкладка: Основные -->
          <div class="settings-tab-content" id="tab-general">
            <!-- Выбор языка -->
            <div class="setting-group">
              <label id="lbl-language">Язык интерфейса</label>
              <select id="language-select">
                <option value="ru">Русский</option>
                <option value="en">English</option>
              </select>
            </div>
            <!-- Папка игры -->
            <div class="setting-group">
              <label id="lbl-game-directory">Папка игры</label>
              <div style="display: flex; gap: 8px;">
                <input type="text" id="game-dir-input" readonly style="flex: 1; cursor: default;">
                <button id="browse-game-dir-btn" class="settings-browse-btn" style="padding: 0 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; border-radius: 4px; font-size: 13px;">Обзор...</button>
              </div>
              <span id="lbl-game-directory-hint" style="font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; display: block; line-height: 1.3;">При смене папки игры старые моды и сборки не переносятся автоматически.</span>
            </div>
          </div>
          
          <!-- Вкладка: Запуск и Java -->
          <div class="settings-tab-content hidden" id="tab-launch">
            <!-- Выделение RAM -->
            <div class="setting-group">
              <label id="lbl-ram">Выделение оперативной памяти</label>
              <div class="range-container">
                <input type="range" id="ram-slider" min="1" max="16" step="1" value="4">
                <div class="ram-input-wrapper">
                  <input type="number" id="ram-input" min="1024" max="16384" step="512" value="4096">
                  <span class="ram-unit" id="lbl-ram-unit">МБ</span>
                </div>
              </div>
            </div>
            <!-- JVM Аргументы -->
            <div class="setting-group">
              <label for="jvm-args-input" id="lbl-jvm">Аргументы JVM</label>
              <input type="text" id="jvm-args-input" placeholder="-XX:+UseG1GC -XX:+ParallelRefProcEnabled">
            </div>
            <!-- Сворачивание в трей при запуске -->
            <div class="setting-group checkbox-group" style="margin-top: 15px;">
              <label class="switch-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
                <input type="checkbox" id="hide-on-launch-checkbox" checked style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                <span id="lbl-hide-on-launch" style="font-size: 13px; font-weight: 500; color: #fff;">Сворачивать лаунчер в трей при запуске</span>
              </label>
            </div>
          </div>
          
          <!-- Вкладка: Внешний вид -->
          <div class="settings-tab-content hidden" id="tab-appearance">
            <!-- Режим темы -->
            <div class="setting-group">
              <label id="lbl-theme-mode">Оформление лаунчера</label>
              <select id="theme-mode-select">
                <option value="custom">Кастомный (React-жидкость)</option>
                <option value="auto">Автоматический (Хамелеон Minecraft) (BETA)</option>
              </select>
            </div>
            
            <!-- Блок автообновления лаунчера -->
            <div id="update-block" class="update-block-container" style="display: none; padding: 12px; border-radius: 6px; margin-top: 16px; box-sizing: border-box;">
              <div class="update-title" id="lbl-update-available" style="font-size: 13px; font-weight: 500; margin-bottom: 4px;">Доступно обновление!</div>
              <div class="update-desc" id="lbl-update-desc" style="font-size: 11px; margin-bottom: 8px; line-height: 1.3;">Доступна новая версия. Хотите обновиться?</div>
              <button id="install-update-btn" style="width: 100%; padding: 8px; background: #00b4ff; color: #000; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; transition: 0.2s; box-shadow: 0 0 10px rgba(0, 180, 255, 0.3);">ОБНОВИТЬ СЕЙЧАС</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="padding: 15px 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: flex-end; background: rgba(0, 0, 0, 0.15);">
        <button id="save-settings-btn" style="margin: 0; min-width: 120px;">СОХРАНИТЬ</button>
      </div>
    </div>
  </div>

  <!-- Элементы оформления Minecraft -->
  <div id="minecraft-bg-container" class="minecraft-only" style="display: none;">
    <div class="panorama-cube">
      <div class="face front"></div>
      <div class="face right"></div>
      <div class="face back"></div>
      <div class="face left"></div>
      <div class="face top"></div>
      <div class="face bottom"></div>
    </div>
    <div class="minecraft-dirt-overlay"></div>
  </div>


  <!-- Оверлей создания сборки -->
  <div id="create-modpack-overlay">
    <div id="create-modpack-modal">
      <div class="modal-header">
        <h2>Создать сборку модов</h2>
        <button id="create-modpack-close" title="Закрыть">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="modpack-name-input">Название сборки</label>
          <input type="text" id="modpack-name-input" placeholder="Например: Custom Pack" autocomplete="off" maxlength="32">
        </div>
        
        <div class="setting-group">
          <label for="modpack-version-select">Версия Minecraft</label>
          <select id="modpack-version-select">
            <!-- Будет заполнено динамически -->
          </select>
        </div>

        <div class="setting-group">
          <label for="modpack-loader-select">Загрузчик модов</label>
          <select id="modpack-loader-select">
            <option value="fabric">Fabric</option>
            <option value="forge">Forge</option>
            <option value="vanilla">Чистая ванилла (без модов)</option>
          </select>
        </div>

        <button id="create-modpack-btn">СОЗДАТЬ</button>
      </div>
    </div>
  </div>

  <!-- Отладочный слой -->
  <button id="copy-log-btn" style="display: none; position: fixed; bottom: 170px; right: 10px; width: 320px; padding: 6px 12px; background: rgba(0, 180, 255, 0.15); border: 1px solid rgba(0, 180, 255, 0.3); color: #00b4ff; border-radius: 6px; z-index: 9999; font-size: 10px; cursor: pointer; font-family: monospace; font-weight: bold; text-transform: uppercase;">Скопировать лог / Copy Log</button>
  <div id="debug-overlay" style="display: none;"></div>

  <div id="bg-container"></div>
  <script type="module" src="js/renderer.js"></script>
</body>
</html>
